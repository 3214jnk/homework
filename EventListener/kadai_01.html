<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>課題1</title>
  </head>
  <body>
    <p id="text">ここに文字が表示されます</p>
    <button id="btn">クリックしてね</button>

    <script>
      const button = document.getElementById('btn');
      const text = document.getElementById('text');

      button.addEventListener('click', () => {
        text.textContent ='こんにちは！'
      })
    </script>
  </body>
</html>
