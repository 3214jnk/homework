<!DOCTYPE html>
<head>
  <meta charset="utf-8">
  <title>課題3</title>
  <style>
    .tab-button {
      padding: 8px 16px;
      margin-right: 8px;
      border: 1px solid #333;
      background-color: white;
      cursor: pointer;
    }

    .tab-button.active {
      background-color: #333;
      color: white;
    }

    .content {
      display: none;
      margin-top: 20px;
      padding: 12px;
      border: 1px solid #ccc;
    }

    .content.active {
      display: block;
    }
  </style>
</head>
<body>
  <h1>タブの切り替え</h1>

  <button class="tab-button active" data-target="profile">プロフィール</button>
  <button class="tab-button" data-target="news">お知らせ</button>
  <button class="tab-button" data-target="settings">設定</button>

  <div id="profile" class="content active">
   <h2> プロフィール</h2>
   <p>ここにはプロフィール情報が表示されます。</p>
  </div>

  <div id="news" class="content">
    <h2>お知らせ</h2>
    <p>ここにはお知らせが表示されます。</p>
  </div>

  <div id="settings" class="content">
    <h2>設定</h2>
    <p>ここには設定画面が表示されます。</p>
  </div>

  <!-- HTMLに追記するバージョン -->
  <!-- <p id="currentTab">現在表示中：プロフィール</p> -->

  <script>
    const tabButtons = document.querySelectorAll(".tab-button");
    const contents = document.querySelectorAll(".content");
    
    //JavaScriptで追記するバージョン　ここから
    const p = document.createElement('p');
     p.textContent = '現在表示中：プロフィール';
     document.body.appendChild(p);
    //ここまで

    tabButtons.forEach(function(button) {
      button.addEventListener("click", function(event) {
        const clickButton = event.target;
        const targetValue = clickButton.dataset.target;

        tabButtons.forEach(function(button) {
          button.classList.remove('active');
        });
        clickButton.classList.add('active');
        
        contents.forEach(function(content) {
          content.classList.remove('active');
        });
        const targetContent = document.getElementById(targetValue);
        targetContent.classList.add('active');

        //JavaScriptで追記するバージョン　ここから
        p.textContent = '現在表示中：' + clickButton.textContent;
        //ここまで

        // HTMLに追記するバージョン
        // const currentTab = document.getElementById("currentTab");
        // currentTab.textContent = '現在表示中：' + clickButton.textContent;

      })
    })
  </script>
</body>
